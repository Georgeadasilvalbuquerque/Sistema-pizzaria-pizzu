<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Pizzaria</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body data-page="login">
    <main class="auth-page">
      <section class="auth-card">
        <h1>Login</h1>
        <p>Acesse para continuar seu pedido.</p>
        <div id="message" class="message info">Entre com email e senha.</div>
        <form id="login-form">
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Senha" required />
          <button type="submit">Entrar</button>
        </form>
        <div class="row-actions">
          <button id="go-register-btn" type="button">Cadastro</button>
          <button type="button" onclick="window.location.href='index.html'">Voltar</button>
        </div>
      </section>
    </main>
    <script src="./js/api.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
